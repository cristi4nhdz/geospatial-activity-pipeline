# config/settings_example.yaml
---
kafka:
  bootstrap_servers: kafka:29092
  topics:
    vessels: ais.vessels
    aircraft: adsb.aircraft

ais:
  api_key: "YOUR_AISSTREAM_API_KEY_HERE"
  ws_url: "wss://stream.aisstream.io/v0/stream"
  bounding_box:
    min_lat: 1.0
    max_lat: 1.6
    min_lon: 103.5
    max_lon: 104.5

opensky:
  username: "YOUR_OPENSKY_USERNAME_HERE"
  password: "YOUR_OPENSKY_PASSWORD_HERE"
  base_url: "https://opensky-network.org/api"
  bounding_box:
    min_lat: 1.0
    max_lat: 1.6
    min_lon: 103.5
    max_lon: 104.5

postgis:
  host: postgres
  port: 5432
  db: geopipeline
  user: geo
  password: geo

minio:
  endpoint: minio:9000
  access_key: minioadmin
  secret_key: minioadmin
  bucket: sentinel-tiles

copernicus:
  username: "YOUR_COPERNICUS_EMAIL_HERE"
  password: "YOUR_COPERNICUS_PASSWORD_HERE"
  client_id: "YOUR_COPERNICUS_CLIENT_ID_HERE"
  client_secret: "YOUR_COPERNICUS_CLIENT_SECRET_HERE"
  token_url: "https://identity.dataspace.copernicus.eu/auth/realms/CDSE/protocol/openid-connect/token"
  search_url: "https://catalogue.dataspace.copernicus.eu/odata/v1/Products"
  download_url: "https://zipper.dataspace.copernicus.eu/api/v1/dataspace/custom-scripts/sentinel-2"

aoi:
  name: singapore_strait
  bbox:
    min_lat: 1.0
    max_lat: 1.6
    min_lon: 103.5
    max_lon: 104.5

change_detection:
  ndvi_threshold: 0.15
  nir_threshold: 0.20
  patch_size: 512

airflow:
  base_url: "http://localhost:8080"

snowflake:
  account: "YOUR_SNOWFLAKE_ACCOUNT_HERE"
  user: "YOUR_SNOWFLAKE_USER_HERE"
  password: "YOUR_SNOWFLAKE_PASSWORD_HERE"
  database: "GEO_PIPELINE"
  schema: "PUBLIC"
  warehouse: "YOUR_SNOWFLAKE_WAREHOUSE_HERE"
