# docker/docker-compose.yaml
---
name: geospatial-pipeline

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    restart: on-failure
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zk-data:/var/lib/zookeeper

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on: [zookeeper]
    restart: on-failure
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  postgres:
    image: postgis/postgis:16-3.4
    restart: on-failure
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo
      POSTGRES_DB: geopipeline
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ../db/schema.sql:/docker-entrypoint-initdb.d/02_schema.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "geo", "-d", "geopipeline"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: on-failure
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  airflow-db:
    image: postgres:16
    restart: on-failure
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
      build:
        context: ..
        dockerfile: Dockerfile.airflow
      depends_on:
        airflow-db:
          condition: service_healthy
      environment:
        AIRFLOW__LOGGING__LOGGING_CONFIG_CLASS: ''
        AIRFLOW_HOME: /opt/airflow
        AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
        AIRFLOW__CORE__EXECUTOR: LocalExecutor
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
        AIRFLOW__CORE__FERNET_KEY: ''
        AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
        AIRFLOW__WEBSERVER__SECRET_KEY: 'geospatial-pipeline'
      volumes:
        - ../dags:/opt/airflow/dags
        - ../imagery:/opt/airflow/imagery
        - ../config:/opt/airflow/config
        - airflow-logs:/opt/airflow/logs
      command: >
        bash -c "/opt/conda/envs/geo-pipeline/bin/airflow db migrate && /opt/conda/envs/geo-pipeline/bin/airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
      restart: on-failure

  airflow-webserver:
    build:
      context: ..
      dockerfile: Dockerfile.airflow
    restart: on-failure
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__LOGGING__LOGGING_CONFIG_CLASS: ''
      AIRFLOW__CORE__MP_START_METHOD: 'spawn'
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'geospatial-pipeline'
    volumes:
      - ../dags:/opt/airflow/dags
      - ../imagery:/opt/airflow/imagery
      - ../config:/opt/airflow/config
      - airflow-logs:/opt/airflow/logs
    command: ["/opt/conda/envs/geo-pipeline/bin/airflow", "webserver"]

  airflow-scheduler:
    build:
      context: ..
      dockerfile: Dockerfile.airflow
    restart: on-failure
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__LOGGING__LOGGING_CONFIG_CLASS: ''
      AIRFLOW__CORE__MP_START_METHOD: 'spawn'
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ../dags:/opt/airflow/dags
      - ../imagery:/opt/airflow/imagery
      - ../config:/opt/airflow/config
      - airflow-logs:/opt/airflow/logs
    command: ["/opt/conda/envs/geo-pipeline/bin/airflow", "scheduler"]

  minio-init:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ../config/settings.yaml:/app/config/settings.yaml
    command: ["python", "-m", "imagery.minio_setup"]
    restart: on-failure

  snowflake-setup:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ../config/settings.yaml:/app/config/settings.yaml
    command: ["python", "-m", "snowflake_loader.setup"]
    restart: on-failure

  ais-producer:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ../config/settings.yaml:/app/config/settings.yaml
    command: ["python", "-m", "ingestion.ais_producer"]
    restart: on-failure

  adsb-producer:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ../config/settings.yaml:/app/config/settings.yaml
    command: ["python", "-m", "ingestion.adsb_producer"]
    restart: on-failure

  vessel-consumer:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../config/settings.yaml:/app/config/settings.yaml
    command: ["python", "-m", "ingestion.consumers.vessel_consumer"]
    restart: on-failure

  aircraft-consumer:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../config/settings.yaml:/app/config/settings.yaml
    command: ["python", "-m", "ingestion.consumers.aircraft_consumer"]
    restart: on-failure

  dashboard:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      - ../config/settings.yaml:/app/config/settings.yaml
    command: ["streamlit", "run", "dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    restart: on-failure

volumes:
  zk-data:
  kafka-data:
  postgres-data:
  minio-data:
  airflow-db-data:
  airflow-logs: