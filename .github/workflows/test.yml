name: Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: geopipeline
          POSTGRES_USER: geo
          POSTGRES_PASSWORD: geo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: '3.13'
        environment-file: environment.yaml
        activate-environment: geo-pipeline

    - name: Setup config file
      shell: bash -l {0}
      run: |
        cp config/settings_example.yaml config/settings.yaml

    - name: Apply database schema
      shell: bash -l {0}
      run: |
        PGPASSWORD=geo psql -h localhost -U geo -d geopipeline -f db/schema.sql

    - name: Run tests with coverage
      shell: bash -l {0}
      run: |
        conda activate geo-pipeline
        pytest --cov --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false