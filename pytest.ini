# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts =
    --verbose
    --cov=ingestion.ais_producer
    --cov=ingestion.adsb_producer
    --cov=ingestion.consumers.vessel_consumer
    --cov=ingestion.consumers.aircraft_consumer
    --cov=ingestion.consumers.lag_monitor
    --cov=imagery.minio_setup
    --cov=imagery.tile_uploader
    --cov=imagery.change_detection
    --cov=imagery.patch_classifier
    --cov=imagery.anomaly_scorer
    --cov=snowflake_loader.setup
    --cov=snowflake_loader.anomaly_loader
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=60

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning